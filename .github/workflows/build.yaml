name: Multi-Architecture Build and Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

env:
  PDFIO_VERSION: 1.6.2
  PDFIO_URL: https://github.com/michaelrsweet/pdfio/releases/download/v1.6.2

jobs:
  build-test-matrix:
    name: Build and Test - ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native x86_64 runner
          - arch: x86_64
            runner: ubuntu-latest
            docker: false

          # Native ARM64 runner
          - arch: arm64
            runner: ubuntu-24.04-arm64
            docker: false

          # Emulated architectures
          - arch: armv7l
            runner: ubuntu-latest
            docker: true
            qemu_arch: armv7

          - arch: riscv64
            runner: ubuntu-latest
            docker: true
            qemu_arch: riscv64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ========================================
      # Native builds (x86_64 and arm64)
      # ========================================
      - name: Native Build Setup - ${{ matrix.arch }}
        if: matrix.docker == false
        run: |
          echo "Setting up native build environment for ${{ matrix.arch }}"
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            autoconf \
            automake \
            autopoint \
            libtool \
            pkg-config \
            gettext \
            libssl-dev \
            libpam-dev \
            libusb-1.0-0-dev \
            zlib1g-dev \
            libcups2-dev \
            libexif-dev \
            liblcms2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libcairo2-dev \
            libopenjp2-7-dev \
            libjpeg-dev \
            libjxl-dev \
            libpoppler-cpp-dev \
            libdbus-1-dev \
            libavahi-client-dev \
            poppler-utils \
            ghostscript \
            wget

      - name: Install PDFio - Native Build
        if: matrix.docker == false
        run: |
          cd /tmp
          wget -q ${PDFIO_URL}/pdfio-${PDFIO_VERSION}.tar.gz
          tar -xzf pdfio-${PDFIO_VERSION}.tar.gz
          cd pdfio-${PDFIO_VERSION}
          ./configure --prefix=/usr --enable-shared
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          cd -

      - name: Native Configure, Build and Test
        if: matrix.docker == false
        run: |
          ./autogen.sh
          ./configure --enable-debug
          make -j$(nproc)
          make check

      # ========================================
      # Emulated builds (armv7 and riscv64)
      # ========================================
      - name: Set up QEMU for Emulation
        if: matrix.docker == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.qemu_arch }}

      - name: Build in Container - ${{ matrix.arch }}
        if: matrix.docker == true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.github/Dockerfile.${{ matrix.qemu_arch }}
          push: false
          tags: libcupsfilters:${{ matrix.arch }}
          platforms: linux/${{ matrix.qemu_arch }}
          cache-from: type=local

  # Optional: Quick syntax validation
  validate-build-config:
    name: Validate Workflow Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate workflow syntax
        run: |
          if ! grep -q "version:" .github/workflows/build-multiarch.yaml; then
            echo "Workflow file exists and has valid YAML structure"
          fi