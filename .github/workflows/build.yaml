name: Build and Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build on ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm  # Native ARM64 runner
          - arch: armhf
            os: ubuntu-latest    # Uses emulation
          - arch: riscv64
            os: ubuntu-latest    # Uses emulation

    steps:
      - uses: actions/checkout@v4

      # For non-native architectures (armhf and riscv64), we use run-on-arch
      - name: Run Tests on ${{ matrix.arch }}
        if: matrix.arch == 'armhf' || matrix.arch == 'riscv64'
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.arch }}
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            apt-get install -y gcc g++ autoconf automake libtool pkg-config \
              libcups2-dev libexif-dev liblcms2-dev libfontconfig1-dev \
              libavahi-client-dev libssl-dev libpam-dev libusb-1.0-0-dev \
              zlib1g-dev libcairo2-dev libopenjp2-7-dev libjpeg-dev \
              libjxl-dev libpoppler-cpp-dev libdbus-1-dev poppler-utils \
              ghostscript wget tar make
          run: |
            # Build and Install PDFio 1.6.2 inside the container
            wget -q https://github.com/michaelrsweet/pdfio/releases/download/v1.6.2/pdfio-1.6.2.tar.gz
            tar -xzf pdfio-1.6.2.tar.gz && cd pdfio-1.6.2
            ./configure --prefix=/usr --enable-shared && make && make install
            cd ..
            # Build libcupsfilters
            ./autogen.sh && ./configure --enable-debug && make && make check

      # For native architectures (x86_64 and arm64), run steps directly
      - name: Standard Build and Test
        if: matrix.arch == 'x86_64' || matrix.arch == 'arm64'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libcups2-dev libexif-dev liblcms2-dev libfontconfig1-dev \
            libavahi-client-dev libssl-dev libpam-dev libusb-1.0-0-dev \
            zlib1g-dev libcairo2-dev libopenjp2-7-dev libjpeg-dev \
            libjxl-dev libpoppler-cpp-dev libdbus-1-dev poppler-utils ghostscript
          # Install PDFio (similar to your existing logic)
          wget -q https://github.com/michaelrsweet/pdfio/releases/download/v1.6.2/pdfio-1.6.2.tar.gz
          tar -xzf pdfio-1.6.2.tar.gz && cd pdfio-1.6.2
          ./configure --prefix=/usr --enable-shared && make && sudo make install
          cd ..
          ./autogen.sh && ./configure --enable-debug && make && make check