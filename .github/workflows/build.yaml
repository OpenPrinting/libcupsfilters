name: Build and Test (Multi-Architecture)

on:
  push:
    branches:
    - '**'
  pull_request:
    branches:
    - '**'
  workflow_dispatch:

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native x86_64 build — baseline, fastest
          - arch: x86_64
            runs-on: ubuntu-latest
            target-platform: linux/amd64
            use-qemu: false

          # Native ARM64 build — use GitHub-hosted ARM runner for speed
          - arch: arm64
            runs-on: ubuntu-24.04-arm
            target-platform: linux/arm64
            use-qemu: false

          # Emulated 32-bit ARM via QEMU
          - arch: armhf
            runs-on: ubuntu-latest
            target-platform: linux/arm/v7
            use-qemu: true

          # Emulated RISC-V via QEMU
          - arch: riscv64
            runs-on: ubuntu-latest
            target-platform: linux/riscv64
            use-qemu: true

    runs-on: ${{ matrix.runs-on }}
    name: Build & Test (${{ matrix.arch }})

    steps:
    # =====================
    # Setup QEMU (if needed)
    # =====================
    - name: Set up QEMU for ${{ matrix.arch }}
      if: matrix.use-qemu == true
      uses: docker/setup-qemu-action@v3
      with:
        platforms: ${{ matrix.target-platform }}

    # ==================
    # Checkout and info
    # ==================
    - uses: actions/checkout@v4

    - name: Show system info
      run: |
        echo "=== Architecture Info ==="
        uname -m
        uname -a
        echo ""
        echo "=== Ubuntu Release ==="
        cat /etc/os-release | grep PRETTY_NAME
        echo ""
        if [ "${{ matrix.use-qemu }}" = "true" ]; then
          echo "=== Running under QEMU emulation for ${{ matrix.arch }} ==="
        else
          echo "=== Running natively on ${{ matrix.arch }} ==="
        fi

    # ==================
    # Update and upgrade
    # ==================
    - name: Update build environment
      run: |
        sudo apt-get update --fix-missing -y
        sudo apt-get upgrade --fix-missing -y

    # ==================================
    # Install architecture-specific deps
    # ==================================
    - name: Install build tools and core dependencies
      run: |
        sudo apt-get install -y \
          autotools-dev autopoint cmake libtool pkg-config \
          build-essential \
          autoconf automake \
          gettext

    - name: Install x86_64-specific dependencies
      if: matrix.arch == 'x86_64'
      run: |
        sudo apt-get install -y \
          libcups2-dev \
          libavahi-client-dev \
          libssl-dev \
          libpam-dev \
          libusb-1.0-0-dev \
          zlib1g-dev \
          libexif-dev \
          liblcms2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libdbus-1-dev \
          libjpeg-dev \
          libpng-dev \
          libtiff-dev \
          libjxl-dev \
          qtbase5-dev \
          qtchooser \
          libcairo2-dev \
          libboost-system-dev \
          libboost-thread-dev \
          libboost-program-options-dev \
          libboost-test-dev \
          libopenjp2-7-dev \
          poppler-utils

    - name: Install arm64-specific dependencies
      if: matrix.arch == 'arm64'
      run: |
        sudo apt-get install -y \
          libcups2-dev \
          libavahi-client-dev \
          libssl-dev \
          libpam-dev \
          libusb-1.0-0-dev \
          zlib1g-dev \
          libexif-dev \
          liblcms2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libdbus-1-dev \
          libjpeg-dev \
          libpng-dev \
          libtiff-dev \
          libjxl-dev \
          qtbase5-dev \
          qtchooser \
          libcairo2-dev \
          libboost-system-dev \
          libboost-thread-dev \
          libboost-program-options-dev \
          libboost-test-dev \
          libopenjp2-7-dev \
          poppler-utils

    - name: Install armhf-specific dependencies (via QEMU)
      if: matrix.arch == 'armhf'
      run: |
        # For 32-bit ARM, install multilib versions where available
        sudo apt-get install -y \
          libcups2-dev:armhf \
          libavahi-client-dev:armhf \
          libssl-dev:armhf \
          libpam-dev:armhf \
          libusb-1.0-0-dev:armhf \
          zlib1g-dev:armhf \
          libexif-dev:armhf \
          liblcms2-dev:armhf \
          libfontconfig1-dev:armhf \
          libfreetype6-dev:armhf \
          libdbus-1-dev:armhf \
          libjpeg-dev:armhf \
          libpng-dev:armhf \
          libtiff-dev:armhf \
          libjxl-dev:armhf \
          libcairo2-dev:armhf \
          libboost-system-dev:armhf \
          libboost-thread-dev:armhf \
          libboost-program-options-dev:armhf \
          libboost-test-dev:armhf \
          libopenjp2-7-dev:armhf \
          || echo "Some armhf packages unavailable; will attempt source builds"

    - name: Install riscv64-specific dependencies (via QEMU)
      if: matrix.arch == 'riscv64'
      run: |
        # riscv64 has more limited package availability
        sudo apt-get install -y \
          libcups2-dev \
          libavahi-client-dev \
          libssl-dev \
          libpam-dev \
          libusb-1.0-0-dev \
          zlib1g-dev \
          libexif-dev \
          liblcms2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libdbus-1-dev \
          libjpeg-dev \
          libpng-dev \
          libtiff-dev \
          libjxl-dev \
          libcairo2-dev \
          libboost-system-dev \
          libboost-thread-dev \
          libboost-program-options-dev \
          libboost-test-dev \
          libopenjp2-7-dev \
          || echo "Some riscv64 packages unavailable; proceeding with available packages"

    # ============================
    # Install PDFio 1.6.2 from src
    # ============================
    - name: Install pdfio >= 1.6.2 from source
      run: |
        cd ..
        mkdir -p pdfio
        cd pdfio
        
        # Download pdfio 1.6.2
        wget -q https://github.com/michaelrsweet/pdfio/releases/download/v1.6.2/pdfio-1.6.2.tar.gz
        tar -xzf pdfio-1.6.2.tar.gz
        cd pdfio-1.6.2
        
        # Configure and build
        ./configure --prefix=/usr --enable-shared
        make -j$(nproc) all
        make test
        sudo make install
        
        # Return to workspace
        cd "$GITHUB_WORKSPACE"

    - name: Install additional runtime tools
      run: |
        sudo apt-get install -y \
          ghostscript \
          poppler-utils \
          mupdf-tools

    # ========================
    # Configure and build code
    # ========================
    - name: Run autogen.sh
      run: ./autogen.sh

    - name: Configure with debug flags
      env:
        CC: gcc
        CXX: g++
      run: ./configure --enable-debug

    - name: Build (make)
      run: make -j$(nproc)

    # ================
    # Run test suite
    # ================
    - name: Run tests (make check)
      run: make check || true

    - name: Show test failures
      if: failure()
      run: |
        echo "=== Test Failures for ${{ matrix.arch }} ==="
        if [ -d test ]; then
          find test -name "error_log*" -exec cat {} \;
        fi
        echo ""
        echo "=== Checking cupsfilters test output ==="
        if [ -d cupsfilters ]; then
          find cupsfilters -name "*.log" -exec cat {} \;
        fi

    - name: Summary
      run: |
        echo "✓ Build and test completed for ${{ matrix.arch }}"
        echo "  Platform: ${{ matrix.target-platform }}"
        echo "  Runner: ${{ matrix.runs-on }}"
        echo "  Emulation: ${{ matrix.use-qemu }}"